user nginx;
worker_processes 1;

error_log /var/log/nginx/error.log warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log off;
    sendfile on;
    keepalive_timeout 65;

    include /etc/nginx/http.d/*.conf;
}
