server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    root /var/www/html;
    index index.php index.html;

    client_max_body_size 0;

    location = /favicon.ico {
        access_log off;
        try_files /favicon.ico =404;
    }

    location ^~ /assets/ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location ^~ /__bookslib_internal/books/ {
        internal;
        alias /books/;
    }

    location ^~ /__bookslib_internal/thumb/ {
        internal;
        alias /var/www/html/data/thumb/;
    }

    location ^~ /__bookslib_internal/legacy-thumb/ {
        internal;
        alias /var/www/html/thumb/;
    }

    location = /opds {
        rewrite ^ /opds.php last;
    }

    location = /opds/ {
        rewrite ^ /opds.php last;
    }

    location ^~ /opds/ {
        rewrite ^/opds/(.*)$ /opds.php?opds_path=$1&$args last;
    }

    location = /data/new_pass.txt {
        deny all;
        return 403;
    }

    location ~* ^/data/.*\.(sqlite|db|json|key|log|lock)$ {
        deny all;
        return 403;
    }

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_read_timeout 300;
    }
}
